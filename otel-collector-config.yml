receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

exporters:
  # Loki supports native OTLP ingestion since v2.9
  otlp_http/loki:
    endpoint: http://loki:3100/otlp

  debug:
    verbosity: basic

service:
  pipelines:
    logs:
      receivers: [otlp]
      exporters: [otlp_http/loki, debug]
    traces:
      receivers: [otlp]
      exporters: [debug]
